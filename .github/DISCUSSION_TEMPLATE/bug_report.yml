name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I try to launch Minecraft using option X, I get an error...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `python main.py`
        2. Choose option ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: method
    attributes:
      label: Which launch method did you use?
      options:
        - Web launcher (option 1)
        - MSBuild launcher (option 2)
        - CLI launcher (option 3)
    validations:
      required: true
  - type: input
    id: python_version
    attributes:
      label: Python version
      description: Output of `python --version`
      placeholder: e.g., Python 3.11.5
    validations:
      required: true
  - type: input
    id: os_version
    attributes:
      label: Windows version
      description: e.g., Windows 10 Pro 22H2
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Copy and paste any relevant log output. This will be automatically formatted.
      render: shell
