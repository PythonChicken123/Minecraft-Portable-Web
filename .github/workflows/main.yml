name: Ruff
on: [push, pull_request]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Mandatory - this copies your files into the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Run Ruff specifically on main.py
      - name: Run Ruff
        uses: astral-sh/ruff-action@v3
        with:
          src: "main.py"
