name: Ruff Auto-Fix
on:
  push:
    paths:
      - '**/*.py'
  pull_request:
    paths:
      - '**/*.py'

permissions:
  contents: write

jobs:
  ruff:
    runs-on: ubuntu-latest
    # Skip if the commit already contains [skip ci]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Ruff
        uses: astral-sh/ruff-action@v3
        with:
          version: "latest"

      - name: Fix linting issues and format
        run: |
          ruff check --fix .
          ruff format .

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --global user.name "${{ github.event.head_commit.author.name }}"
          git config --global user.email "${{ github.event.head_commit.author.email }}"
          git add .
          git commit -m "Apply automatic ruff fixes and formatting [skip ci]"
          git push
