name: Ruff
on: [push, pull_request]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ruff
        uses: astral-sh/ruff-action@v3
        with:
          version: "latest"
          github-token: ${{ secrets.CUSTOM_GITHUB_TOKEN }}
          # This prevents the action from running its default "check" 
          # so we can run our custom fix/format commands below.
          args: "--version"

      - name: Fix linting issues in launch.py
        run: ruff check --fix launch.py

      - name: Format launch.py
        run: ruff format launch.py
