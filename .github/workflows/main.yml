name: Ruff
on: [push, pull_request]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ruff
        uses: astral-sh/ruff-action@v3
        with:
          version: "latest"

      - name: Run Ruff linting
        run: ruff check launch.py

      - name: Check Ruff formatting
        run: ruff format --check launch.py
